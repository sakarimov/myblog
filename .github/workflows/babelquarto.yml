name: Render & Deploy Multilingual Site
permissions: write-all

on:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.4.550"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync Python dependencies
        run: uv sync

      - name: Register Jupyter kernel
        run: uv run python -m ipykernel install --user --name python3

      - name: Restore R packages from renv.lock
        run: Rscript -e 'install.packages("renv", repos="https://packagemanager.posit.co/cran/__linux__/noble/latest"); renv::restore()'

      - name: Debug — list files
        run: |
          pwd
          tree -L 2
          python3 --version

      - name: Render multilingual site with babelquarto
        run: |
          source .venv/bin/activate
          Rscript -e 'source("renv/activate.R"); babelquarto::render_website(project_path = "myblog")'

      - name: Archive book render
        uses: actions/upload-artifact@v4
        with:
          name: book_render
          path: myblog/_site/

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: myblog/_site
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
